<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Form Example</title>
</head>
<body>

    <h1>HTML Form Example</h1>
    <p>This is an example of an<del>HTML4</del> <ins>HTML5</ins> form containing يحتوي various <span style=" background-color:yellow;">input</span> controls:</p>

    <form>

        <!-- User Information -->
        <fieldset>
            <legend>User Information</legend>

            <label>Username:</label>
            <input type="text"><br><br>

            <label>Email:</label>
            <input type="email"><br><br>

            <label>Password:</label>
            <input type="password"><br><br>
        </fieldset>

        <!-- Contact Information -->
        <fieldset>
            <legend>Contact Information</legend>

            <label>Phone:</label>
            <input type="tel"><br><br>

            <label>Message:</label><br>
            <textarea rows="5" cols="40"></textarea>
        </fieldset>

        <!-- Subscription -->
        <fieldset>
            <legend>Subscription</legend>

            <label>Subscribe to newsletter:</label>
            <input type="checkbox"><br>

            <label>Subscribe to newsletter:</label>
            <input type="checkbox">
        </fieldset>

        <!-- Preferred Language -->
        <fieldset>
            <legend>Preferred Language</legend>

            <label>Select your preferred language:</label>
            <select>
                <option>English</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
            </select>
        </fieldset>

        <!-- Feedback -->
        <fieldset>
            <legend>Feedback</legend>

            <label>Rate our service:</label>
            <input type="range" min="0" max="10">
        </fieldset>

        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
